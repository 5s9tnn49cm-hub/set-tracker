<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#FAF6F1"/>

  <!-- Outer ring (S) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#8B9E6B" stroke-width="28" opacity="0.7"/>

  <!-- Middle ring (E) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#A0522D" stroke-width="28" opacity="0.8"/>

  <!-- Inner circle (T) - the center/destination -->
